            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
        }

            padding: 30px 32px;
        }

            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255,180,71,0.2);
        }
        button {
            background: #1e2b3c;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            width: 100%;
            position: relative;
        }
        button:active {

        }
        button:hover:not(:active) {
            background: #ff9f2e;
            color: #1e2b3c;
        }
        .error-msg {
            color: #d9534f;
            background: #ffe6e5;
            padding: 10px;
            border-radius: 28px;
            text-align: center;
            margin-top: 15px;
        }

            display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 25px 0;
        }
        .exam-card {
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 1px solid #ffe3bf;
            cursor: pointer;
        }
        .exam-card:hover {
            transform: translateY(-5px);
            border-color: #ffb347;
        }
        .exam-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e2b3c;
        }
        .admin-actions {
            margin: 20px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #2c4b5e;
            width: auto;
            padding: 12px 28px;
        }
        .danger-btn {
            background: #b13e3e;
        }
        .export-btn {
            background: #27ae60;
        }
        .quiz-area {
            background: white;
            border-radius: 48px;
            padding: 30px;
            margin-top: 20px;
        }

            background: #e0e7ef;

            overflow: hidden;
        }
        .progress-fill {
            background: #ffb347;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 25px 0;
        }
        .options {
            display: flex;

            border-radius: 50px;
            border: 1px solid #cfdfed;
            font-weight: 500;
            width: 100%;
        }
        .option-btn.selected {
            background: #ffb347;
            color: white;
            border-color: #ff9f2e;
        }
        .option-btn.correct-highlight {
            background: #2ecc71 !important;
            color: white;
        }
        .option-btn.wrong-highlight {
            background: #e74c3c !important;
            color: white;
        }

            background: #27ae60;
            margin-top: 20px;
            width: auto;
            padding: 12px 30px;
        }
        .confirm-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .timer {
            background: #1e2b3c;
            color: #ffb347;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        .result-box {
            text-align: center;
            background: linear-gradient(135deg, #fff1e0 0%, #ffe8d4 100%);
            border-radius: 48px;
            padding: 35px;
            margin-top: 20px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .result-box::before {
            content: "🏆";
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            bottom: -20px;
            right: -20px;
            transform: rotate(-15deg);
        }
        .result-box h2 {
            font-size: 1.8rem;
            color: #1e2b3c;
            margin-bottom: 20px;
        }
        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ff9f2e;
            margin: 15px 0;
        }
        .result-percent {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .hide {
            display: none;
        }
        .question-item {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 24px;
            margin: 12px 0;
            background: #fafafa;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;

            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }

        .result-box h2 { font-size: 1.8rem; color: #1e2b3c; margin-bottom: 20px; }
        .result-score { font-size: 3rem; font-weight: bold; color: #ff9f2e; margin: 15px 0; }
        .result-percent { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .hide { display: none; }
        
        /* تنسيق زر التلجرام */
        .telegram-footer {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e2b3c, #2c4b5e);
            margin-top: 30px;
            border-radius: 48px 48px 32px 32px;
        }
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            width: auto;
        }
        .telegram-btn:hover {
            background: #006699;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .telegram-btn:active {
            transform: translateY(0);
        }
        .telegram-icon {
            font-size: 1.5rem;
        }
        .footer-text {
            color: #ffb347;
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        @media (max-width: 700px) { .main-panel { padding: 20px; } .question-text { font-size: 1.2rem; } .result-score { font-size: 2rem; } }
    </style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<div class="app-container">
    <div class="header">
        <div class="logo"><h1>📚 نظام اختبارات الطلاب</h1><p>أدخل بياناتك لبدء الاختبار</p></div>
        <div class="user-greeting" id="greetingSpan">مرحباً، طالبنا العزيز</div>
    </div>
    <div class="main-panel" id="mainPanel">
        <div id="loginPanel">
            <div class="login-card">
                <h2 style="margin-bottom: 24px;">🔐 تسجيل الدخول</h2>
                <div class="input-group"><label>👤 الاسم الرباعي</label><input type="text" id="loginName" placeholder="أدخل اسمك الرباعي (مثال: أحمد محمد علي حسن)"></div>
                <div class="input-group"><label>🔒 كلمة السر</label><input type="password" id="loginPass" placeholder="كلمة المرور"></div>
                <button id="doLoginBtn">دخول ➡️</button>
                <div id="loginError" class="error-msg hide"></div>
            </div>
        </div>
        <div id="dashboardPanel" class="dashboard">
            <h2>📖 الاختبارات المتاحة</h2>
            <div id="examsListContainer" class="exam-grid"></div>
            <div id="quizPanel" class="hide"></div>
        </div>
    </div>
    
    <!-- قسم التلجرام في أسفل الصفحة -->
    <div class="telegram-footer" id="telegramFooter">
        <a href="${telegramLink}" target="_blank" class="telegram-btn" id="telegramLinkBtn">
            <span class="telegram-icon">📢</span>
            <span>انضم لقناتنا الرئيسية</span>
            <span class="telegram-icon">💬</span>
        </a>
        <div class="footer-text">
            ✨ لمزيد من الحصص والاختبارات المجانية ✨
        </div>
    </div>
</div>

<script>
    (function(){
        // هذا المخصص للطلاب فقط - لا يوجد دخول كمدير
        
        let EXAMS_DATA = ${examsJSON};
        let STUDENT_ATTEMPTS = new Map(Object.entries(${attemptsJSON}));
        let GENERAL_STUDENT_PASSWORD = "${password}";
        
        let currentUser = null;
        let activeExam = null;
        let currentIndex = 0;
        let confirmedAnswers = [];
        let selectedTempAnswer = null;
        let examStartTime = null;
        let timerInterval = null;
        let quizActive = false;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#e74c3c' : '#27ae60';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function saveToLocalStorage() {
            localStorage.setItem("exams_data", JSON.stringify(EXAMS_DATA));
            localStorage.setItem("student_password", GENERAL_STUDENT_PASSWORD);
            localStorage.setItem("attempts", JSON.stringify(Object.fromEntries(STUDENT_ATTEMPTS)));
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function isExamExpired(expiryDate) { if(!expiryDate) return false; return new Date(expiryDate) < new Date(); }
        function getActiveExams() { return EXAMS_DATA.filter(exam => !isExamExpired(exam.expiryDate)); }
        function checkQuadName(name) { const parts = name.trim().split(/\\s+/); return parts.length === 4; }
        function hasTakenExam(studentName, examId) { return STUDENT_ATTEMPTS.has(\`\${studentName}_\${examId}\`); }
        function recordAttempt(studentName, examId, score, total, percentage) {
            STUDENT_ATTEMPTS.set(\`\${studentName}_\${examId}\`, { score, total, percentage, date: new Date().toLocaleString() });
            saveToLocalStorage();
        }
        
        class FireworkParticle {
            constructor(x, y, color, vx, vy, size = 3) {
                this.x = x; this.y = y; this.color = color;
                this.vx = vx; this.vy = vy;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = 0.015;
                this.size = size;
            }
            update() { this.vx *= 0.99; this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; return this.alpha > 0; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
        }
        
        class FireworksSystem {
            constructor() {
                this.canvas = document.getElementById('fireworksCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.animationId = null;
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            explode(x, y) {
                const colors = ['#ff0000', '#ff6600', '#ffcc00', '#00ff66', '#3399ff', '#ff33cc', '#ff9933', '#ff3399', '#ff00ff', '#00ffff'];
                for(let i=0;i<150;i++){
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 9;
                    const color = colors[Math.floor(Math.random()*colors.length)];
                    this.particles.push(new FireworkParticle(x, y, color, Math.cos(angle)*speed, Math.sin(angle)*speed, 2));
                }
                this.animate();
            }
            multiExplosion() {
                const w = this.canvas.width, h = this.canvas.height;
                [[w*0.2,h*0.25],[w*0.5,h*0.15],[w*0.8,h*0.3],[w*0.3,h*0.5],[w*0.7,h*0.45],[w*0.5,h*0.55],[w*0.15,h*0.7],[w*0.85,h*0.65],[w*0.5,h*0.8]].forEach((pos,idx) => setTimeout(()=>this.explode(pos[0],pos[1]), idx*100));
                setTimeout(()=>{ this.explode(w*0.5, h*0.4); this.explode(w*0.3, h*0.6); this.explode(w*0.7, h*0.5); }, 1000);
            }
            animate() {
                if(this.particles.length===0) {
                    if(this.animationId) cancelAnimationFrame(this.animationId);
                    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                    return;
                }
                this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                for(let i=this.particles.length-1;i>=0;i--) if(!this.particles[i].update()) this.particles.splice(i,1);
                this.particles.forEach(p=>p.draw(this.ctx));
                this.animationId = requestAnimationFrame(()=>this.animate());
            }
        }
        const fireworks = new FireworksSystem();
        function triggerFireworks() { fireworks.multiExplosion(); }
        
        async function generateBeautifulPDF(studentName, examTitle, score, total, percentage, dateStr) {
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.top = '-9999px';
            tempDiv.style.left = '-9999px';
            tempDiv.style.width = '600px';
            tempDiv.style.backgroundColor = '#ffffff';
            tempDiv.style.borderRadius = '32px';
            tempDiv.style.overflow = 'hidden';
            tempDiv.style.fontFamily = 'Tajawal, Segoe UI, system-ui, sans-serif';
            tempDiv.style.boxShadow = '0 25px 50px -12px rgba(0,0,0,0.25)';
            tempDiv.innerHTML = \`
                <div style="background: linear-gradient(135deg, #1e2b3c 0%, #2c4b5e 100%); padding: 30px; text-align: center; position: relative;">
                    <div style="position: absolute; top: 10px; left: 15px; font-size: 35px;">⭐</div>
                    <div style="position: absolute; top: 10px; right: 15px; font-size: 35px;">⭐</div>
                    <h1 style="color: #ffb347; font-size: 32px; margin: 0;">📚 نتيجة الاختبار</h1>
                    <p style="color: #ffffff; font-size: 16px; margin: 10px 0 0 0;">تقرير أداء الطالب</p>
                    <div style="width: 100px; height: 3px; background: #ffb347; margin: 15px auto 0;"></div>
                </div>
                <div style="padding: 40px; text-align: center;">
                    <div style="width: 90px; height: 90px; background: linear-gradient(135deg, #ffb347, #ff9f2e); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                        <span style="font-size: 50px;">🏆</span>
                    </div>
                    <h2 style="color: #1e2b3c; font-size: 28px; margin-bottom: 10px;">نتيجة الاختبار</h2>
                    <div style="background: linear-gradient(135deg, #f8f9fa, #fff); border-radius: 24px; padding: 25px; margin: 20px 0; border: 1px solid #ffe3bf;">
                        <p style="font-size: 20px; color: #1e2b3c; margin: 10px 0;"><strong>👤 اسم الطالب:</strong> \${studentName}</p>
                        <p style="font-size: 18px; color: #1e2b3c; margin: 10px 0;"><strong>📚 الاختبار:</strong> \${examTitle}</p>
                        <p style="font-size: 14px; color: #95a5a6; margin: 10px 0;"><strong>📅 التاريخ:</strong> \${dateStr}</p>
                    </div>
                    <div style="margin: 35px 0;">
                        <div style="display: flex; justify-content: center; gap: 50px; flex-wrap: wrap;">
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: #ff9f2e;">\${score}</div><div style="color: #6c757d;">الإجابات الصحيحة</div></div>
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: #ff9f2e;">\${total}</div><div style="color: #6c757d;">إجمالي الأسئلة</div></div>
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: \${percentage >= 70 ? '#27ae60' : (percentage >= 50 ? '#ff9f2e' : '#e74c3c')};">\${percentage}%</div><div style="color: #6c757d;">النسبة المئوية</div></div>
                        </div>
                    </div>
                    <div style="margin-top: 30px;"><div style="display: inline-block; background: \${percentage >= 70 ? '#27ae60' : (percentage >= 50 ? '#ff9f2e' : '#e74c3c')}; color: white; padding: 8px 25px; border-radius: 40px; font-size: 18px; font-weight: bold;">\${percentage >= 90 ? '🌟 ممتاز 🌟' : (percentage >= 70 ? '👍 جيد جداً 👍' : (percentage >= 50 ? '📖 مقبول 📖' : '📚 يحتاج إلى تحسين 📚'))}</div></div>
                </div>
            \`;
            document.body.appendChild(tempDiv);
            try {
                const canvas = await html2canvas(tempDiv, { scale: 2.5, backgroundColor: '#ffffff', logging: false });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const imgWidth = 200;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                const doc = new jsPDF({ unit: 'mm', format: 'a4' });
                const xPos = (doc.internal.pageSize.getWidth() - imgWidth) / 2;
                doc.addImage(imgData, 'PNG', xPos, 15, imgWidth, imgHeight);
                doc.save(\`نتيجة_\${studentName}_\${examTitle}.pdf\`);
            } catch(e) { showToast("خطأ في PDF", true); }
            finally { document.body.removeChild(tempDiv); }
        }
        
        // ========== عرض الاختبارات مع منع الإعادة ==========
        function renderExamsList() {
            const container = document.getElementById('examsListContainer');
            const activeExams = getActiveExams();
            if(activeExams.length === 0) { container.innerHTML = '<div style="padding:40px; text-align:center;">📭 لا توجد اختبارات متاحة</div>'; return; }
            let html = '';
            for(let exam of activeExams) {
                let attempted = currentUser && hasTakenExam(currentUser.name, exam.id);
                html += \`<div class="exam-card"><div class="exam-title">📌 \${escapeHtml(exam.title)}</div><p>⏱️ \${exam.timeLimitMinutes} دقيقة</p><p>📝 \${exam.questions.length} سؤال</p>\${attempted ? '<span style="color:#e67e22;">✅ سبق وأديت هذا الاختبار ولا يمكنك إعادته</span>' : '<button class="start-exam-btn" data-id="'+exam.id+'" style="background:#ff9f2e; margin-top:12px; width:auto;">بدء الاختبار 🧪</button>'}</div>\`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.start-exam-btn').forEach(btn => btn.addEventListener('click', () => startExam(btn.getAttribute('data-id'))));
        }
        
        function startExam(examId) {
            if(quizActive) return;
            const exam = EXAMS_DATA.find(e => e.id === examId);
            if(!exam || isExamExpired(exam.expiryDate)) { showToast("الاختبار غير متاح", true); renderExamsList(); return; }
            // منع الإعادة للطالب
            if(hasTakenExam(currentUser.name, exam.id)) { showToast("لا يمكنك إعادة الاختبار فقد قمت بأدائه مسبقاً", true); return; }
            activeExam = JSON.parse(JSON.stringify(exam));
            currentIndex = 0;
            confirmedAnswers = new Array(exam.questions.length).fill(null);
            selectedTempAnswer = null;
            quizActive = true;
            examStartTime = Date.now();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!quizActive) return;
                const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
                const remaining = Math.max(0, (exam.timeLimitMinutes * 60) - elapsed);
                if(remaining <= 0) { clearInterval(timerInterval); if(quizActive) finishQuiz(true); }
                const timerElem = document.getElementById('quizTimer');
                if(timerElem) timerElem.innerText = \`⏱️ \${Math.floor(remaining/60)}:\${(remaining%60).toString().padStart(2,'0')}\`;
            }, 1000);
            renderQuizInterface();
        }
        
        function renderQuizInterface() {
            if(!activeExam || !quizActive) return;
            const q = activeExam.questions[currentIndex];
            const progress = ((currentIndex+1)/activeExam.questions.length)*100;
            const isConfirmed = confirmedAnswers[currentIndex] !== null;
            let opts = '';
            const letters = ['A','B','C','D','E'];
            for(let i=0; i<q.options.length; i++) opts += \`<button class="option-btn \${selectedTempAnswer===letters[i]?'selected':''}" data-opt="\${letters[i]}">\${letters[i]}. \${escapeHtml(q.options[i])}</button>\`;
            const quizHtml = \`<div class="quiz-area"><div class="timer" id="quizTimer">⏱️ \${activeExam.timeLimitMinutes}:00</div><div class="progress-bar"><div class="progress-fill" style="width:\${progress}%;"></div></div><div class="question-text">\${escapeHtml(q.text)}</div><div class="options" id="quizOptions">\${opts}</div><button id="confirmAnswerBtn" class="confirm-btn" \${isConfirmed ? 'disabled' : ''}>\${isConfirmed ? '✓ تم تأكيد الإجابة' : '✅ تأكيد الإجابة'}</button><div id="quizFeedback"></div></div>\`;
            document.getElementById('quizPanel').innerHTML = quizHtml;
            document.getElementById('quizPanel').classList.remove('hide');
            document.getElementById('examsListContainer').classList.add('hide');
            if(!isConfirmed) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.onclick = () => {
                        if(confirmedAnswers[currentIndex] !== null) return;
                        document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedTempAnswer = btn.getAttribute('data-opt');
                        const cb = document.getElementById('confirmAnswerBtn');
                        if(cb) { cb.disabled = false; cb.innerText = '✅ تأكيد الإجابة'; }
                    };
                });
            }
            document.getElementById('confirmAnswerBtn').onclick = () => {
                if(confirmedAnswers[currentIndex] !== null) return;
                if(!selectedTempAnswer) { showToast("اختر إجابة", true); return; }
                confirmedAnswers[currentIndex] = selectedTempAnswer;
                const isCorrect = selectedTempAnswer === activeExam.questions[currentIndex].correct;
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    const val = btn.getAttribute('data-opt');
                    if(val === activeExam.questions[currentIndex].correct) btn.classList.add('correct-highlight');
                    if(val === selectedTempAnswer && val !== activeExam.questions[currentIndex].correct) btn.classList.add('wrong-highlight');
                    btn.style.pointerEvents = 'none';
                });
                const fb = document.getElementById('quizFeedback');
                if(isCorrect) { fb.innerHTML = '<span style="color:#2ecc71;">✅ إجابة صحيحة! 🎉</span>'; triggerFireworks(); }
                else fb.innerHTML = \`<span style="color:#e67e22;">❌ إجابة خاطئة، الصواب: \${activeExam.questions[currentIndex].correct}</span>\`;
                document.getElementById('confirmAnswerBtn').disabled = true;
                setTimeout(() => {
                    if(currentIndex + 1 < activeExam.questions.length) { currentIndex++; selectedTempAnswer = null; renderQuizInterface(); }
                    else finishQuiz(false);
                }, 1300);
            };
        }
        
        async function finishQuiz(timeoutExpired) {
            if(timerInterval) clearInterval(timerInterval);
            if(!quizActive) return;
            quizActive = false;
            let correctCount = 0;
            for(let i=0; i<activeExam.questions.length; i++) if(confirmedAnswers[i] === activeExam.questions[i].correct) correctCount++;
            const total = activeExam.questions.length;
            const percentage = Math.round((correctCount/total)*100);
            const dateStr = new Date().toLocaleString();
            // تسجيل المحاولة لمنع الإعادة
            recordAttempt(currentUser.name, activeExam.id, correctCount, total, percentage);
            let message = percentage >= 90 ? "ممتاز! 🏆" : (percentage >= 70 ? "جيد جداً 👍" : (percentage >= 50 ? "مقبول 📖" : "لا تستسلم 💪"));
            document.getElementById('quizPanel').innerHTML = \`<div class="result-box"><h2>\${message}</h2><div style="background:white;border-radius:32px;padding:25px;margin:20px 0;"><p style="font-size:1.4rem;">👤 \${escapeHtml(currentUser.name)}</p><p style="font-size:0.9rem;">📅 \${dateStr}</p><div class="result-score">\${correctCount} / \${total}</div><div class="result-percent" style="color:\${percentage>=70?'#27ae60':'#ff9f2e'}">\${percentage}%</div></div><div style="display:flex; gap:15px; justify-content:center;"><button id="downloadPDFBtn" style="background:#2c4b5e; width:auto;">📄 تحميل PDF</button><button id="backToExamsBtn" style="background:#ffb347; width:auto;">🔙 القائمة</button></div></div>\`;
            document.getElementById('downloadPDFBtn')?.addEventListener('click', () => generateBeautifulPDF(currentUser.name, activeExam.title, correctCount, total, percentage, dateStr));
            document.getElementById('backToExamsBtn')?.addEventListener('click', () => { document.getElementById('quizPanel').classList.add('hide'); document.getElementById('examsListContainer').classList.remove('hide'); activeExam = null; renderExamsList(); });
        }
        
        function attemptLogin() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errorDiv = document.getElementById('loginError');
            if(!name) { errorDiv.innerText = "أدخل الاسم الرباعي"; errorDiv.classList.remove('hide'); return; }
            if(!checkQuadName(name)) { errorDiv.innerText = "⚠️ الاسم الرباعي مطلوب (4 أجزاء) مثال: أحمد محمد علي حسن"; errorDiv.classList.remove('hide'); return; }
            if(pass === GENERAL_STUDENT_PASSWORD) { currentUser = { name: name, role: "student" }; loginSuccess(); return; }
            errorDiv.innerText = "كلمة السر غير صحيحة"; errorDiv.classList.remove('hide');
        }
        
        function loginSuccess() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            document.getElementById('greetingSpan').innerHTML = \`مرحباً، \${escapeHtml(currentUser.name)} ✨\`;
            renderExamsList();
        }
        
        document.getElementById('doLoginBtn').onclick = attemptLogin;
        
        loadFromLocalStorage();
    })();
<\/script>
</body>
</html>`;
        }
        
        // ========== ألعاب نارية محسنة ==========
        class FireworkParticle {
            constructor(x, y, color, vx, vy, size = 3) {
                this.x = x; this.y = y; this.color = color;
                this.vx = vx; this.vy = vy;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = 0.015;
                this.size = size;
            }
            update() { this.vx *= 0.99; this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; return this.alpha > 0; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
        }
        
        class FireworksSystem {
            constructor() {
                this.canvas = document.getElementById('fireworksCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.animationId = null;
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            explode(x, y) {
                const colors = ['#ff0000', '#ff6600', '#ffcc00', '#00ff66', '#3399ff', '#ff33cc', '#ff9933', '#ff3399', '#ff00ff', '#00ffff'];
                const particleCount = 150;
                for(let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 9;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.particles.push(new FireworkParticle(x, y, color, vx, vy, 2));
                }
                this.animate();
            }
            multiExplosion() {
                const w = this.canvas.width, h = this.canvas.height;
                const positions = [[w*0.2,h*0.25],[w*0.5,h*0.15],[w*0.8,h*0.3],[w*0.3,h*0.5],[w*0.7,h*0.45],[w*0.5,h*0.55],[w*0.15,h*0.7],[w*0.85,h*0.65],[w*0.5,h*0.8]];
                positions.forEach((pos, idx) => setTimeout(() => this.explode(pos[0], pos[1]), idx * 100));
                setTimeout(() => { this.explode(w*0.5, h*0.4); this.explode(w*0.3, h*0.6); this.explode(w*0.7, h*0.5); }, 1000);
            }
            animate() {
                if(this.particles.length === 0) {
                    if(this.animationId) cancelAnimationFrame(this.animationId);
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    return;
                }
                this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                for(let i = this.particles.length - 1; i >= 0; i--) {
                    if(!this.particles[i].update()) this.particles.splice(i, 1);
                    else this.particles[i].draw(this.ctx);
                }
                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }
        
        const fireworksSys = new FireworksSystem();
        function triggerFireworks() { fireworksSys.multiExplosion(); }
        
        // ========== PDF رائع ==========

                    </div>
                    <h2 style="color: #1e2b3c; font-size: 28px; margin-bottom: 10px;">نتيجة الاختبار</h2>
                    
                    <div style="background: linear-gradient(135deg, #f8f9fa, #fff); border-radius: 24px; padding: 25px; margin: 20px 0; border: 1px solid #ffe3bf;">

                                <div style="color: #6c757d; font-size: 14px;">النسبة المئوية</div>

        // دوال مساعدة
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function isExamExpired(expiryDate) { if(!expiryDate) return false; return new Date(expiryDate) < new Date(); }
        function getActiveExams() { return EXAMS_DATA.filter(exam => !isExamExpired(exam.expiryDate)); }
        function checkQuadName(name) { const parts = name.trim().split(/\s+/); return parts.length === 4; }
        function hasTakenExam(studentName, examId) { return STUDENT_ATTEMPTS.has(`${studentName}_${examId}`); }
        function recordAttempt(studentName, examId, score, total, percentage) {
            STUDENT_ATTEMPTS.set(`${studentName}_${examId}`, { score, total, percentage, date: new Date().toLocaleString() });
            saveToLocalStorage();
        }
        
        // عرض الاختبارات (مع منع الإعادة)
        function renderExamsList() {
            const container = document.getElementById('examsListContainer');
            const activeExams = getActiveExams();
            if(activeExams.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center;">📭 لا توجد اختبارات متاحة</div>';
                return;
            }
            let html = '';
            for(let exam of activeExams) {
                // التحقق إذا كان الطالب قد أجرى الاختبار سابقاً
                let attempted = currentUser?.role === 'student' && hasTakenExam(currentUser.name, exam.id);
                html += `<div class="exam-card"><div class="exam-title">📌 ${escapeHtml(exam.title)}</div><p>⏱️ ${exam.timeLimitMinutes} دقيقة</p><p>📝 ${exam.questions.length} سؤال</p>${attempted ? '<span style="color:#e67e22;">✅ سبق وأديت هذا الاختبار ولا يمكنك إعادته</span>' : '<button class="start-exam-btn" data-id="'+exam.id+'" style="background:#ff9f2e; margin-top:12px; width:auto;">بدء الاختبار 🧪</button>'}</div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.start-exam-btn').forEach(btn => btn.addEventListener('click', () => startExam(btn.getAttribute('data-id'))));
        }
        
        function preventBackButton() { history.pushState(null, null, location.href); }
        
        function startExam(examId) {
            if(quizActive) return;
            const exam = EXAMS_DATA.find(e => e.id === examId);
            if(!exam || isExamExpired(exam.expiryDate)) { showToast("الاختبار غير متاح", true); renderExamsList(); return; }
            // منع الإعادة للطالب
            if(currentUser.role === 'student' && hasTakenExam(currentUser.name, exam.id)) { showToast("لا يمكنك إعادة الاختبار فقد قمت بأدائه مسبقاً", true); return; }
            preventBackButton();
            activeExam = JSON.parse(JSON.stringify(exam));
            currentIndex = 0;
            confirmedAnswers = new Array(exam.questions.length).fill(null);
            selectedTempAnswer = null;
            quizActive = true;
            examStartTime = Date.now();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!quizActive) return;
                const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
                const remaining = Math.max(0, (exam.timeLimitMinutes * 60) - elapsed);
                if(remaining <= 0) { clearInterval(timerInterval); if(quizActive) finishQuiz(true); }
                const timerElem = document.getElementById('quizTimer');
                if(timerElem) timerElem.innerText = `⏱️ ${Math.floor(remaining/60)}:${(remaining%60).toString().padStart(2,'0')}`;
            }, 1000);
            renderQuizInterface();
        }
        
        function renderQuizInterface() {
            if(!activeExam || !quizActive) return;
            const q = activeExam.questions[currentIndex];
            const progress = ((currentIndex+1)/activeExam.questions.length)*100;
            const isConfirmed = confirmedAnswers[currentIndex] !== null;
            let opts = '';
            const letters = ['A','B','C','D','E'];
            for(let i=0; i<q.options.length; i++) opts += `<button class="option-btn ${selectedTempAnswer===letters[i]?'selected':''}" data-opt="${letters[i]}">${letters[i]}. ${escapeHtml(q.options[i])}</button>`;
            const quizHtml = `<div class="quiz-area"><div class="timer" id="quizTimer">⏱️ ${activeExam.timeLimitMinutes}:00</div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div><div class="question-text">${escapeHtml(q.text)}</div><div class="options" id="quizOptions">${opts}</div><button id="confirmAnswerBtn" class="confirm-btn" ${isConfirmed ? 'disabled' : ''}>${isConfirmed ? '✓ تم تأكيد الإجابة' : '✅ تأكيد الإجابة'}</button><div id="quizFeedback"></div></div>`;
            document.getElementById('quizPanel').innerHTML = quizHtml;
            document.getElementById('quizPanel').classList.remove('hide');
            document.getElementById('examsListContainer').classList.add('hide');
            if(!isConfirmed) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.onclick = () => {
                        if(confirmedAnswers[currentIndex] !== null) return;
                        document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedTempAnswer = btn.getAttribute('data-opt');
                        const cb = document.getElementById('confirmAnswerBtn');
                        if(cb) { cb.disabled = false; cb.innerText = '✅ تأكيد الإجابة'; }
                    };
                });
            }
            document.getElementById('confirmAnswerBtn').onclick = () => {
                if(confirmedAnswers[currentIndex] !== null) return;
                if(!selectedTempAnswer) { showToast("اختر إجابة", true); return; }
                confirmedAnswers[currentIndex] = selectedTempAnswer;
                const isCorrect = selectedTempAnswer === activeExam.questions[currentIndex].correct;
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    const val = btn.getAttribute('data-opt');
                    if(val === activeExam.questions[currentIndex].correct) btn.classList.add('correct-highlight');
                    if(val === selectedTempAnswer && val !== activeExam.questions[currentIndex].correct) btn.classList.add('wrong-highlight');
                    btn.style.pointerEvents = 'none';
                });
                const fb = document.getElementById('quizFeedback');
                if(isCorrect) { fb.innerHTML = '<span style="color:#2ecc71;">✅ إجابة صحيحة! 🎉</span>'; triggerFireworks(); }
                else fb.innerHTML = `<span style="color:#e67e22;">❌ إجابة خاطئة، الصواب: ${activeExam.questions[currentIndex].correct}</span>`;
                document.getElementById('confirmAnswerBtn').disabled = true;
                setTimeout(() => {
                    if(currentIndex + 1 < activeExam.questions.length) { currentIndex++; selectedTempAnswer = null; renderQuizInterface(); }
                    else finishQuiz(false);
                }, 1300);
            };
        }
        
        async function finishQuiz(timeoutExpired) {
            if(timerInterval) clearInterval(timerInterval);
            if(!quizActive) return;
            quizActive = false;
            let correctCount = 0;
            for(let i=0; i<activeExam.questions.length; i++) if(confirmedAnswers[i] === activeExam.questions[i].correct) correctCount++;
            const total = activeExam.questions.length;
            const percentage = Math.round((correctCount/total)*100);
            const dateStr = new Date().toLocaleString();
            // تسجيل المحاولة للطالب فقط
            if(currentUser.role === 'student') recordAttempt(currentUser.name, activeExam.id, correctCount, total, percentage);
            let message = percentage >= 90 ? "ممتاز! 🏆" : (percentage >= 70 ? "جيد جداً 👍" : (percentage >= 50 ? "مقبول 📖" : "لا تستسلم 💪"));
            document.getElementById('quizPanel').innerHTML = `<div class="result-box"><h2>${message}</h2><div style="background:white;border-radius:32px;padding:25px;margin:20px 0;"><p style="font-size:1.4rem;">👤 ${escapeHtml(currentUser.name)}</p><p style="font-size:0.9rem;">📅 ${dateStr}</p><div class="result-score">${correctCount} / ${total}</div><div class="result-percent" style="color:${percentage>=70?'#27ae60':'#ff9f2e'}">${percentage}%</div></div><div style="display:flex; gap:15px; justify-content:center;"><button id="downloadPDFBtn" style="background:#2c4b5e; width:auto;">📄 تحميل PDF</button><button id="backToExamsBtn" style="background:#ffb347; width:auto;">🔙 القائمة</button></div></div>`;
            document.getElementById('downloadPDFBtn')?.addEventListener('click', () => generateBeautifulPDF(currentUser.name, activeExam.title, correctCount, total, percentage, dateStr));
            document.getElementById('backToExamsBtn')?.addEventListener('click', () => { document.getElementById('quizPanel').classList.add('hide'); document.getElementById('examsListContainer').classList.remove('hide'); activeExam = null; renderExamsList(); });
        }
        
        // تسجيل الدخول
        function attemptLogin() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errorDiv = document.getElementById('loginError');
            if(!name) { errorDiv.innerText = "أدخل الاسم"; errorDiv.classList.remove('hide'); return; }
            if(pass === ADMIN_PASSWORD) { currentUser = { name: "مدير النظام", role: "admin" }; loginSuccess(); return; }
            if(!checkQuadName(name)) { errorDiv.innerText = "⚠️ الاسم الرباعي مطلوب (4 أجزاء) مثال: أحمد محمد علي حسن"; errorDiv.classList.remove('hide'); return; }
            if(pass === GENERAL_STUDENT_PASSWORD) { currentUser = { name: name, role: "student" }; loginSuccess(); return; }
            errorDiv.innerText = "كلمة السر غير صحيحة"; errorDiv.classList.remove('hide');
        }
        
        function loginSuccess() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            document.getElementById('greetingSpan').innerHTML = `مرحباً، ${escapeHtml(currentUser.name)} ✨`;
            if(currentUser.role === 'admin') {
                document.getElementById('adminOnlyZone').classList.remove('hide');
                document.getElementById('globalStudentPass').value = GENERAL_STUDENT_PASSWORD;
                updateDeleteSelect();
            } else { document.getElementById('adminOnlyZone').classList.add('hide'); }
            renderExamsList();
        }
        
        function updateDeleteSelect() {
            const select = document.getElementById('deleteExamSelect');
            select.innerHTML = '<option value="">-- اختر اختبار للحذف --</option>';
            EXAMS_DATA.forEach(ex => { let opt = document.createElement('option'); opt.value = ex.id; opt.innerText = ex.title; select.appendChild(opt); });
        }
        
        function addQuestionToCreator() {
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'question-item';
            div.innerHTML = `<input type="text" placeholder="نص السؤال" class="q-text" style="width:100%; margin:5px 0;"><div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"><input type="text" placeholder="الخيار أ" class="opt-a"><input type="text" placeholder="الخيار ب" class="opt-b"><input type="text" placeholder="الخيار ج" class="opt-c"><input type="text" placeholder="الخيار د" class="opt-d"><input type="text" placeholder="الخيار هـ (اختياري)" class="opt-e"></div><select class="correct-ans"><option value="A">أ</option><option value="B">ب</option><option value="C">ج</option><option value="D">د</option><option value="E">هـ</option></select><button class="remove-question-btn" style="background:#aaa; margin-top:8px; width:auto;">❌ حذف</button>`;
            div.querySelector('.remove-question-btn').onclick = () => div.remove();
            container.appendChild(div);
        }
        
        function collectQuestions() {
            const items = document.querySelectorAll('.question-item');
            let questions = [];
            for(let item of items) {
                const text = item.querySelector('.q-text').value;
                if(!text) { showToast("الرجاء إدخال نص السؤال", true); return null; }
                let opts = [item.querySelector('.opt-a').value, item.querySelector('.opt-b').value, item.querySelector('.opt-c').value, item.querySelector('.opt-d').value];
                const optE = item.querySelector('.opt-e').value;
                if(optE.trim()) opts.push(optE);
                const correct = item.querySelector('.correct-ans').value;
                if(!opts.every(o=>o.trim())) { showToast("الرجاء ملء جميع خيارات السؤال", true); return null; }
                questions.push({ text, options: opts, correct });
            }
            return questions;
        }
        
        function saveNewExam() {
            const title = document.getElementById('examTitleInput').value.trim();
            const timeLimit = parseInt(document.getElementById('examTimeLimit').value);
            const expiryDate = document.getElementById('examExpiryDate').value;
            if(!title) { showToast("الرجاء إدخال اسم الاختبار", true); return; }
            if(!expiryDate) { showToast("الرجاء تحديد تاريخ انتهاء صلاحية الاختبار", true); return; }
            const questions = collectQuestions();
            if(!questions || questions.length===0) { showToast("الرجاء إضافة أسئلة للاختبار", true); return; }
            EXAMS_DATA.push({ id: "exam_"+Date.now()+"_"+Math.floor(Math.random()*10000), title, timeLimitMinutes: timeLimit, expiryDate, questions });
            saveToLocalStorage();
            showToast("✅ تم حفظ الاختبار بنجاح!");
            document.getElementById('examCreatorModal').classList.add('hide');
            renderExamsList();
            updateDeleteSelect();
        }
        
        function deleteSelectedExam() {
            const id = document.getElementById('deleteExamSelect').value;
            if(!id) { showToast("الرجاء اختيار اختبار للحذف", true); return; }
            if(confirm("⚠️ هل أنت متأكد من حذف هذا الاختبار نهائياً؟")) {
                EXAMS_DATA = EXAMS_DATA.filter(ex => ex.id !== id);
                saveToLocalStorage();
                renderExamsList();
                updateDeleteSelect();
                showToast("✅ تم حذف الاختبار");
                document.getElementById('deleteExamModal').classList.add('hide');
            }
        }
        
        // ربط الأحداث
        document.getElementById('doLoginBtn').onclick = attemptLogin;
        document.getElementById('createExamBtn').onclick = () => { document.getElementById('examTitleInput').value = ''; document.getElementById('examTimeLimit').value = 30; document.getElementById('examExpiryDate').value = ''; document.getElementById('questionsContainer').innerHTML = ''; addQuestionToCreator(); document.getElementById('examCreatorModal').classList.remove('hide'); };
        document.getElementById('deleteExamBtn').onclick = () => { updateDeleteSelect(); document.getElementById('deleteExamModal').classList.remove('hide'); };
        document.getElementById('confirmDeleteExam').onclick = deleteSelectedExam;
        document.getElementById('cancelDeleteModalBtn').onclick = () => document.getElementById('deleteExamModal').classList.add('hide');
        document.getElementById('addQuestionBtn').onclick = addQuestionToCreator;
        document.getElementById('saveExamBtn').onclick = saveNewExam;
        document.getElementById('cancelCreatorBtn').onclick = () => document.getElementById('examCreatorModal').classList.add('hide');
        document.getElementById('saveGlobalPassBtn').onclick = () => { const newPass = document.getElementById('globalStudentPass').value.trim(); if(newPass) { GENERAL_STUDENT_PASSWORD = newPass; saveToLocalStorage(); showToast("✅ تم تحديث كلمة سر الطلاب"); } };
        document.getElementById('exportFullHTMLBtn').onclick = () => exportStudentOnlyHTML();
        
        loadFromLocalStorage();
        renderExamsList();
        
        window.addEventListener('beforeunload', () => { saveToLocalStorage(); });
    })();
</script>
