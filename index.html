<script>
    (function(){
        let EXAMS_DATA = [];
        let STUDENT_ATTEMPTS = new Map(Object.entries({"يحيى هود محمد عبدالقادر_exam_1778081736064_8385":{"score":1,"total":1,"percentage":100,"date":"6‏/5‏/2026 5:36:12 م"},"يحيى هود محمد عبدالقادر_exam_1778082462664_7073":{"score":1,"total":1,"percentage":100,"date":"6‏/5‏/2026 5:48:04 م"},"يحيى هود محمد عبدالقادر_exam_1778309865685_8564":{"score":0,"total":1,"percentage":0,"date":"9‏/5‏/2026 9:12:49 ص"},"يحيى هود محمد عبدالقادر_exam_1778309942342_9335":{"score":0,"total":1,"percentage":0,"date":"9‏/5‏/2026 9:12:53 ص"}}));
        let GENERAL_STUDENT_PASSWORD = "123";
        const STAGES = {"all":"جميع المراحل","primary1":"الصف الأول الابتدائي","primary2":"الصف الثاني الابتدائي","primary3":"الصف الثالث الابتدائي","primary4":"الصف الرابع الابتدائي","primary5":"الصف الخامس الابتدائي","primary6":"الصف السادس الابتدائي","middle1":"الصف الأول المتوسط","middle2":"الصف الثاني المتوسط","middle3":"الصف الثالث المتوسط","secondary1":"الصف الأول الثانوي","secondary2":"الصف الثاني الثانوي","secondary3":"الصف الثالث الثانوي"};
        
        let currentUser = null;
        let currentUserStage = null;
        let activeExam = null;
        let currentIndex = 0;
        let confirmedAnswers = [];
        let selectedTempAnswer = null;
        let examStartTime = null;
        let timerInterval = null;
        let quizActive = false;
        
        // ========== نظام الحماية المحسن ==========
        // دالة الحصول على مفتاح المحاولة الفريد: اسم الطالب + وقت إنشاء الاختبار
        function getAttemptKey(studentName, exam) {
            return studentName + "_" + exam.creationTimestamp;
        }
        
        // التحقق مما إذا كان الطالب قد اختبر هذا الاختبار من قبل
        function hasTakenExam(studentName, exam) {
            reloadAttemptsFromStorage();
            const key = getAttemptKey(studentName, exam);
            return STUDENT_ATTEMPTS.has(key);
        }
        
        // الحصول على محاولة سابقة
        function getExistingAttempt(studentName, exam) {
            reloadAttemptsFromStorage();
            const key = getAttemptKey(studentName, exam);
            return STUDENT_ATTEMPTS.get(key);
        }
        
        // تسجيل محاولة جديدة
        function recordAttempt(studentName, exam, score, total, percentage) {
            const key = getAttemptKey(studentName, exam);
            if(!STUDENT_ATTEMPTS.has(key)) {
                STUDENT_ATTEMPTS.set(key, {
                    studentName: studentName,
                    examId: exam.id,
                    examTitle: exam.title,
                    creationTimestamp: exam.creationTimestamp,
                    creationDate: exam.creationDate,
                    score: score,
                    total: total,
                    percentage: percentage,
                    attemptDate: new Date().toISOString(),
                    attemptDateFormatted: new Date().toLocaleString()
                });
                saveToLocalStorage();
                return true;
            }
            return false;
        }
        
        function reloadAttemptsFromStorage() {
            const storedAttempts = localStorage.getItem("attempts");
            if(storedAttempts) {
                STUDENT_ATTEMPTS = new Map(Object.entries(JSON.parse(storedAttempts)));
            }
        }
        
        function showToast(message, isError = false) {

            setTimeout(() => toast.remove(), 3000);
        }
        
        function saveToLocalStorage() {
            localStorage.setItem("exams_data", JSON.stringify(EXAMS_DATA));
            localStorage.setItem("student_password", GENERAL_STUDENT_PASSWORD);
            localStorage.setItem("attempts", JSON.stringify(Object.fromEntries(STUDENT_ATTEMPTS)));
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function isExamExpired(expiryDate) { if(!expiryDate) return false; return new Date(expiryDate) < new Date(); }
        function getActiveExams() { 
            return EXAMS_DATA.filter(exam => {
                if(isExamExpired(exam.expiryDate)) return false;
                if(exam.targetStage && exam.targetStage !== 'all' && exam.targetStage !== currentUserStage) return false;
                return true;
            }); 
        }
        function checkQuadName(name) { const parts = name.trim().split(/\s+/); return parts.length === 4; }
        
        class FireworkParticle {
            constructor(x, y, color, vx, vy, size = 3) {
                this.x = x; this.y = y; this.color = color;
                this.vx = vx; this.vy = vy;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = 0.015;
                this.size = size;
            }
            update() { this.vx *= 0.99; this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; return this.alpha > 0; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
        }
        
        class FireworksSystem {
            constructor() {
                this.canvas = document.getElementById('fireworksCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.animationId = null;
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            explode(x, y) {
                const colors = ['#ff0000', '#ff6600', '#ffcc00', '#00ff66', '#3399ff', '#ff33cc', '#ff9933', '#ff3399', '#ff00ff', '#00ffff'];
                for(let i=0;i<150;i++){
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 9;
                    const color = colors[Math.floor(Math.random()*colors.length)];
                    this.particles.push(new FireworkParticle(x, y, color, Math.cos(angle)*speed, Math.sin(angle)*speed, 2));
                }
                this.animate();
            }
            multiExplosion() {
                const w = this.canvas.width, h = this.canvas.height;
                [[w*0.2,h*0.25],[w*0.5,h*0.15],[w*0.8,h*0.3],[w*0.3,h*0.5],[w*0.7,h*0.45],[w*0.5,h*0.55],[w*0.15,h*0.7],[w*0.85,h*0.65],[w*0.5,h*0.8]].forEach((pos,idx) => setTimeout(()=>this.explode(pos[0],pos[1]), idx*100));
                setTimeout(()=>{ this.explode(w*0.5, h*0.4); this.explode(w*0.3, h*0.6); this.explode(w*0.7, h*0.5); }, 1000);
            }
            animate() {
                if(this.particles.length===0) {
                    if(this.animationId) cancelAnimationFrame(this.animationId);
                    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                    return;
                }
                this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                for(let i=this.particles.length-1;i>=0;i--) if(!this.particles[i].update()) this.particles.splice(i,1);
                this.particles.forEach(p=>p.draw(this.ctx));
                this.animationId = requestAnimationFrame(()=>this.animate());
            }
        }
        const fireworks = new FireworksSystem();
        function triggerFireworks() { fireworks.multiExplosion(); }
        
        async function generateBeautifulPDF(studentName, examTitle, score, total, percentage, dateStr) {
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.top = '-9999px';
            tempDiv.style.left = '-9999px';
            tempDiv.style.width = '600px';
            tempDiv.style.backgroundColor = '#ffffff';
            tempDiv.style.borderRadius = '32px';
            tempDiv.style.overflow = 'hidden';
            tempDiv.style.fontFamily = 'Tajawal, Segoe UI, system-ui, sans-serif';
            tempDiv.style.boxShadow = '0 25px 50px -12px rgba(0,0,0,0.25)';
            tempDiv.innerHTML = `
                <div style="background: linear-gradient(135deg, #1e2b3c 0%, #2c4b5e 100%); padding: 30px; text-align: center; position: relative;">
                    <div style="position: absolute; top: 10px; left: 15px; font-size: 35px;">⭐</div>
                    <div style="position: absolute; top: 10px; right: 15px; font-size: 35px;">⭐</div>
                    <h1 style="color: #ffb347; font-size: 32px; margin: 0;">📚 نتيجة الاختبار</h1>
                    <p style="color: #ffffff; font-size: 16px; margin: 10px 0 0 0;">تقرير أداء الطالب</p>
                    <div style="width: 100px; height: 3px; background: #ffb347; margin: 15px auto 0;"></div>
                </div>
                <div style="padding: 40px; text-align: center;">
                    <div style="width: 90px; height: 90px; background: linear-gradient(135deg, #ffb347, #ff9f2e); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                        <span style="font-size: 50px;">🏆</span>
                    </div>
                    <h2 style="color: #1e2b3c; font-size: 28px; margin-bottom: 10px;">نتيجة الاختبار</h2>
                    <div style="background: linear-gradient(135deg, #f8f9fa, #fff); border-radius: 24px; padding: 25px; margin: 20px 0; border: 1px solid #ffe3bf;">
                        <p style="font-size: 20px; color: #1e2b3c; margin: 10px 0;"><strong>👤 اسم الطالب:</strong> ${studentName}</p>
                        <p style="font-size: 18px; color: #1e2b3c; margin: 10px 0;"><strong>📚 الاختبار:</strong> ${examTitle}</p>
                        <p style="font-size: 14px; color: #95a5a6; margin: 10px 0;"><strong>📅 التاريخ:</strong> ${dateStr}</p>
                    </div>
                    <div style="margin: 35px 0;">
                        <div style="display: flex; justify-content: center; gap: 50px; flex-wrap: wrap;">
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: #ff9f2e;">${score}</div><div style="color: #6c757d;">الإجابات الصحيحة</div></div>
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: #ff9f2e;">${total}</div><div style="color: #6c757d;">إجمالي الأسئلة</div></div>
                            <div style="text-align: center;"><div style="font-size: 55px; font-weight: bold; color: ${percentage >= 70 ? '#27ae60' : (percentage >= 50 ? '#ff9f2e' : '#e74c3c')};">${percentage}%</div><div style="color: #6c757d;">النسبة المئوية</div></div>
                        </div>
                    </div>
                    <div style="margin-top: 30px;"><div style="display: inline-block; background: ${percentage >= 70 ? '#27ae60' : (percentage >= 50 ? '#ff9f2e' : '#e74c3c')}; color: white; padding: 8px 25px; border-radius: 40px; font-size: 18px; font-weight: bold;">${percentage >= 90 ? '🌟 ممتاز 🌟' : (percentage >= 70 ? '👍 جيد جداً 👍' : (percentage >= 50 ? '📖 مقبول 📖' : '📚 يحتاج إلى تحسين 📚'))}</div></div>
                </div>
            `;
            document.body.appendChild(tempDiv);
            try {
                const canvas = await html2canvas(tempDiv, { scale: 2.5, backgroundColor: '#ffffff', logging: false });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const imgWidth = 200;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                const doc = new jsPDF({ unit: 'mm', format: 'a4' });
                const xPos = (doc.internal.pageSize.getWidth() - imgWidth) / 2;
                doc.addImage(imgData, 'PNG', xPos, 15, imgWidth, imgHeight);
                doc.save(`نتيجة_${studentName}_${examTitle}.pdf`);
            } catch(e) { showToast("خطأ في PDF", true); }
            finally { document.body.removeChild(tempDiv); }
        }
        
        function renderExamsList() {
            const container = document.getElementById('examsListContainer');
            const activeExams = getActiveExams();
            if(activeExams.length === 0) { container.innerHTML = '<div style="padding:40px; text-align:center;">📭 لا توجد اختبارات متاحة لمرحلتك الدراسية</div>'; return; }
            let html = '';
            for(let exam of activeExams) {
                let attempted = currentUser && hasTakenExam(currentUser.name, exam);
                let isReattemptable = (exam.attemptType === 'multiple');
                let existingAttempt = attempted ? getExistingAttempt(currentUser.name, exam) : null;
                let buttonHtml = '';
                
                if(!attempted) {
                    buttonHtml = '<button class="start-exam-btn" data-id="'+exam.id+'" style="background:#ff9f2e; margin-top:12px; width:auto;">بدء الاختبار 🧪</button>';
                } else {
                    if(isReattemptable) {
                        buttonHtml = '<button class="start-exam-btn" data-id="'+exam.id+'" style="background:#ffb347; margin-top:12px; width:auto;">⚠️ إعادة المحاولة (الدرجة الأولى ثابتة: ' + existingAttempt.score + '/' + existingAttempt.total + ')</button>';
                    } else {
                        buttonHtml = '<span style="color:#e67e22; display:block; margin-top:12px;">✅ سبق وأديت هذا الاختبار (مرة واحدة فقط)<br><small>النتيجة: ' + existingAttempt.score + '/' + existingAttempt.total + ' (' + existingAttempt.percentage + '%)</small></span>';
                    }
                }
                
                let stageBadge = exam.targetStage && exam.targetStage !== 'all' ? '<span style="background:#ffb347; color:white; padding:3px 10px; border-radius:20px; font-size:0.8rem;">' + (STAGES[exam.targetStage] || exam.targetStage) + '</span>' : '<span style="background:#95a5a6; color:white; padding:3px 10px; border-radius:20px; font-size:0.8rem;">جميع المراحل</span>';
                let creationDateFormatted = exam.creationDate ? new Date(exam.creationDate).toLocaleString() : 'غير معروف';
                
                html += `<div class="exam-card"><div class="exam-title">📌 ${escapeHtml(exam.title)} ${stageBadge}</div><p>⏱️ ${exam.timeLimitMinutes} دقيقة | 📝 ${exam.questions.length} سؤال</p><p><span class="exam-info-badge">🕐 تاريخ الإنشاء: ${creationDateFormatted}</span></p><p><small>${exam.attemptType === 'single' ? '❌ مرة واحدة فقط (لا يمكن الإعادة)' : '🔄 قابل للإعادة (الدرجة الأولى ثابتة)'}</small></p>${buttonHtml}</div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.start-exam-btn').forEach(btn => btn.addEventListener('click', () => startExam(btn.getAttribute('data-id'))));
        }
        
        function startExam(examId) {
            if(quizActive) return;
            reloadAttemptsFromStorage();
            
            const exam = EXAMS_DATA.find(e => e.id === examId);
            if(!exam || isExamExpired(exam.expiryDate)) { showToast("الاختبار غير متاح", true); renderExamsList(); return; }
            
            const existingAttempt = getExistingAttempt(currentUser.name, exam);
            
            // منع الإعادة للاختبارات من نوع "مرة واحدة"
            if(exam.attemptType === 'single' && existingAttempt) {
                showToast("⛔ لا يمكنك إعادة هذا الاختبار لأنه مخصص لمرة واحدة فقط. نتيجتك السابقة: " + existingAttempt.score + "/" + existingAttempt.total, true);
                return;
            }
            
            // للاختبارات القابلة للإعادة
            if(exam.attemptType === 'multiple' && existingAttempt) {
                showToast("⚠️ ملاحظة: هذا الاختبار قابل للإعادة ولكن درجتك الأولى (" + existingAttempt.score + "/" + existingAttempt.total + ") هي الثابتة ولن تتغير", false);
            }
            
            activeExam = JSON.parse(JSON.stringify(exam));
            currentIndex = 0;
            confirmedAnswers = new Array(exam.questions.length).fill(null);
            selectedTempAnswer = null;
            quizActive = true;
            examStartTime = Date.now();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!quizActive) return;
                const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
                const remaining = Math.max(0, (exam.timeLimitMinutes * 60) - elapsed);
                if(remaining <= 0) { clearInterval(timerInterval); if(quizActive) finishQuiz(true); }
                const timerElem = document.getElementById('quizTimer');
                if(timerElem) timerElem.innerText = `⏱️ ${Math.floor(remaining/60)}:${(remaining%60).toString().padStart(2,'0')}`;
            }, 1000);
            renderQuizInterface();
        }
        
        function renderQuizInterface() {
            if(!activeExam || !quizActive) return;
            const q = activeExam.questions[currentIndex];
            const progress = ((currentIndex+1)/activeExam.questions.length)*100;
            const isConfirmed = confirmedAnswers[currentIndex] !== null;
            let opts = '';
            const letters = ['A','B','C','D','E'];
            for(let i=0; i<q.options.length; i++) opts += `<button class="option-btn ${selectedTempAnswer===letters[i]?'selected':''}" data-opt="${letters[i]}">${letters[i]}. ${escapeHtml(q.options[i])}</button>`;
            const quizHtml = `<div class="quiz-area"><div class="timer" id="quizTimer">⏱️ ${activeExam.timeLimitMinutes}:00</div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div><div class="question-text">${escapeHtml(q.text)}</div><div class="options" id="quizOptions">${opts}</div><button id="confirmAnswerBtn" class="confirm-btn" ${isConfirmed ? 'disabled' : ''}>${isConfirmed ? '✓ تم تأكيد الإجابة' : '✅ تأكيد الإجابة'}</button><div id="quizFeedback"></div></div>`;
            document.getElementById('quizPanel').innerHTML = quizHtml;
            document.getElementById('quizPanel').classList.remove('hide');
            document.getElementById('examsListContainer').classList.add('hide');
            if(!isConfirmed) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.onclick = () => {
                        if(confirmedAnswers[currentIndex] !== null) return;
                        document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedTempAnswer = btn.getAttribute('data-opt');
                        const cb = document.getElementById('confirmAnswerBtn');
                        if(cb) { cb.disabled = false; cb.innerText = '✅ تأكيد الإجابة'; }
                    };
                });
            }
            document.getElementById('confirmAnswerBtn').onclick = () => {
                if(confirmedAnswers[currentIndex] !== null) return;
                if(!selectedTempAnswer) { showToast("اختر إجابة", true); return; }
                confirmedAnswers[currentIndex] = selectedTempAnswer;
                const isCorrect = selectedTempAnswer === activeExam.questions[currentIndex].correct;
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    const val = btn.getAttribute('data-opt');
                    if(val === activeExam.questions[currentIndex].correct) btn.classList.add('correct-highlight');
                    if(val === selectedTempAnswer && val !== activeExam.questions[currentIndex].correct) btn.classList.add('wrong-highlight');
                    btn.style.pointerEvents = 'none';
                });
                const fb = document.getElementById('quizFeedback');
                if(isCorrect) { fb.innerHTML = '<span style="color:#2ecc71;">✅ إجابة صحيحة! 🎉</span>'; triggerFireworks(); }
                else fb.innerHTML = `<span style="color:#e67e22;">❌ إجابة خاطئة، الصواب: ${activeExam.questions[currentIndex].correct}</span>`;
                document.getElementById('confirmAnswerBtn').disabled = true;
                setTimeout(() => {
                    if(currentIndex + 1 < activeExam.questions.length) { currentIndex++; selectedTempAnswer = null; renderQuizInterface(); }
                    else finishQuiz(false);
                }, 1300);
            };
        }
        
        async function finishQuiz(timeoutExpired) {
            if(timerInterval) clearInterval(timerInterval);
            if(!quizActive) return;
            quizActive = false;
            
            let correctCount = 0;
            for(let i=0; i<activeExam.questions.length; i++) if(confirmedAnswers[i] === activeExam.questions[i].correct) correctCount++;
            const total = activeExam.questions.length;
            const percentage = Math.round((correctCount/total)*100);
            const dateStr = new Date().toLocaleString();
            
            let finalScore = correctCount;
            let finalPercentage = percentage;
            let isNewRecord = false;
            
            reloadAttemptsFromStorage();
            const existingAttempt = getExistingAttempt(currentUser.name, activeExam);
            
            if(!existingAttempt) {
                // محاولة أولى: نسجل النتيجة
                isNewRecord = recordAttempt(currentUser.name, activeExam, correctCount, total, percentage);
                if(isNewRecord) {
                    showToast("✅ تم حفظ درجتك الأولى", false);
                }
            } else {
                // محاولة إعادة: نستخدم النتيجة القديمة
                finalScore = existingAttempt.score;
                finalPercentage = existingAttempt.percentage;
                showToast("🔒 هذه محاولة إعادة، درجتك الأولى هي الثابتة: " + finalScore + "/" + total, false);
            }
            
            let message = finalPercentage >= 90 ? "ممتاز! 🏆" : (finalPercentage >= 70 ? "جيد جداً 👍" : (finalPercentage >= 50 ? "مقبول 📖" : "لا تستسلم 💪"));
            if(existingAttempt && !isNewRecord) message = "📌 نتيجة المحاولة الأولى (ثابتة): " + message;
            
            document.getElementById('quizPanel').innerHTML = `<div class="result-box"><h2>${message}</h2><div style="background:white;border-radius:32px;padding:25px;margin:20px 0;"><p style="font-size:1.4rem;">👤 ${escapeHtml(currentUser.name)}</p><p style="font-size:0.9rem;">📅 ${dateStr}</p><div class="result-score">${finalScore} / ${total}</div><div class="result-percent" style="color:${finalPercentage>=70?'#27ae60':'#ff9f2e'}">${finalPercentage}%</div></div><div style="display:flex; gap:15px; justify-content:center;"><button id="downloadPDFBtn" style="background:#2c4b5e; width:auto;">📄 تحميل PDF</button><button id="backToExamsBtn" style="background:#ffb347; width:auto;">🔙 القائمة</button></div></div>`;
            document.getElementById('downloadPDFBtn')?.addEventListener('click', () => generateBeautifulPDF(currentUser.name, activeExam.title, finalScore, total, finalPercentage, dateStr));
            document.getElementById('backToExamsBtn')?.addEventListener('click', () => { document.getElementById('quizPanel').classList.add('hide'); document.getElementById('examsListContainer').classList.remove('hide'); activeExam = null; renderExamsList(); });
        }
        
        function attemptLogin() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const stage = document.getElementById('loginStage').value;
            const errorDiv = document.getElementById('loginError');
            if(!name) { errorDiv.innerText = "أدخل الاسم الرباعي"; errorDiv.classList.remove('hide'); return; }
            if(!checkQuadName(name)) { errorDiv.innerText = "⚠️ الاسم الرباعي مطلوب (4 أجزاء) مثال: أحمد محمد علي حسن"; errorDiv.classList.remove('hide'); return; }
            if(!stage) { errorDiv.innerText = "⚠️ الرجاء اختيار المرحلة الدراسية"; errorDiv.classList.remove('hide'); return; }
            if(pass === GENERAL_STUDENT_PASSWORD) { currentUser = { name: name, role: "student" }; currentUserStage = stage; loginSuccess(); return; }
            errorDiv.innerText = "كلمة السر غير صحيحة"; errorDiv.classList.remove('hide');
        }
        
        function loginSuccess() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            document.getElementById('greetingSpan').innerHTML = `مرحباً، ${escapeHtml(currentUser.name)} ✨ | ${STAGES[currentUserStage] || currentUserStage}`;
            renderExamsList();
        }
        
        function loadFromLocalStorage() {
            const storedExams = localStorage.getItem("exams_data");
            const storedPass = localStorage.getItem("student_password");
            const storedAttempts = localStorage.getItem("attempts");
            if(storedExams) EXAMS_DATA = JSON.parse(storedExams);
            if(storedPass) GENERAL_STUDENT_PASSWORD = storedPass;
            if(storedAttempts) STUDENT_ATTEMPTS = new Map(Object.entries(JSON.parse(storedAttempts)));
            EXAMS_DATA.forEach(exam => {
                if (!exam.targetStage) exam.targetStage = "all";
                if (!exam.creationTimestamp) {
                    exam.creationTimestamp = Date.now();
                    exam.creationDate = new Date().toISOString();
                }
            });
        }
        
        loadFromLocalStorage();
        document.getElementById('doLoginBtn').onclick = attemptLogin;
        
        // منع التلاعب بالمحاولات عن طريق إعادة التحميل المستمر
        window.addEventListener('beforeunload', () => { saveToLocalStorage(); });
        setInterval(() => { reloadAttemptsFromStorage(); }, 2000);
    })();
</script>
